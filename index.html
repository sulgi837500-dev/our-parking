<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="우리차">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1923">
<title>우리차 어디있지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f1923;
    --bg2: #1a2535;
    --bg3: #212f42;
    --accent: #4fc3f7;
    --accent2: #81d4fa;
    --text: #e8f4fd;
    --text2: #8fafc9;
    --text3: #4a6580;
    --success: #4caf7d;
    --card-border: rgba(79,195,247,0.15);
    --radius: 16px;
    --radius-sm: 10px;
    --benz-logo: url('https://upload.wikimedia.org/wikipedia/commons/9/90/Mercedes-Benz_Logo_2010.svg');
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
    padding-bottom: env(safe-area-inset-bottom);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,195,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,195,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 430px;
    margin: 0 auto;
    width: 100%;
    padding: 0 20px 40px;
    flex: 1;
  }

  /* Header */
  .header { padding: 60px 0 30px; text-align: center; }
  .header-logo {
    width: 64px; height: 64px; margin: 0 auto 16px;
    background-image: var(--benz-logo);
    background-size: contain; background-repeat: no-repeat; background-position: center;
    filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.5));
  }
  .header h1 { font-size: 24px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
  .header p { font-size: 14px; color: var(--text3); margin-top: 6px; font-weight: 300; }

  /* Connection status */
  .conn-status { display: flex; align-items: center; justify-content: center; gap: 6px; padding-bottom: 20px; font-size: 11px; color: var(--text3); }
  .conn-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text3); }
  .conn-dot.online { background: var(--success); box-shadow: 0 0 4px var(--success); }

  /* Current status card */
  .status-card {
    background: var(--bg2); border: 1px solid var(--card-border); border-radius: var(--radius);
    padding: 24px 20px; margin-bottom: 30px; position: relative; overflow: hidden;
  }
  .status-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0.6;
  }
  .status-label { font-size: 11px; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 12px; }
  .status-location { font-size: 28px; font-weight: 700; color: var(--accent); line-height: 1.2; }
  .status-meta { display: flex; align-items: center; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.06); }
  .meta-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); box-shadow: 0 0 6px var(--success); }
  .meta-text { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .meta-who { margin-left: auto; font-size: 11px; color: var(--accent); background: rgba(79,195,247,0.1); border: 1px solid rgba(79,195,247,0.2); border-radius: 20px; padding: 3px 10px; }

  /* Zone grid */
  .section-label { font-size: 11px; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 12px; }
  .zones { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .zone-btn {
    background: var(--bg2); border: 1px solid rgba(255,255,255,0.07); border-radius: var(--radius-sm);
    padding: 18px 14px; cursor: pointer; text-align: left; transition: all 0.2s; position: relative;
  }
  .zone-btn.selected { border-color: var(--accent); background: rgba(79,195,247,0.08); box-shadow: 0 0 0 1px rgba(79,195,247,0.3); }
  .zone-logo-icon {
    width: 20px; height: 20px; margin-bottom: 10px;
    background-image: var(--benz-logo); background-size: contain; background-repeat: no-repeat; background-position: center;
    filter: brightness(0) invert(1); opacity: 0.5; display: block;
  }
  .zone-btn.selected .zone-logo-icon { filter: none; opacity: 1; }
  .zone-floor { font-size: 16px; font-weight: 700; color: var(--text); display: block; }
  .zone-desc { font-size: 12px; color: var(--text3); display: block; margin-top: 3px; }

  /* Input and Save Button */
  .name-row { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
  .name-input { flex: 1; background: var(--bg2); border: 1px solid rgba(255,255,255,0.07); border-radius: var(--radius-sm); padding: 14px; color: var(--text); font-size: 15px; outline: none; }
  .save-btn { width: 100%; padding: 18px; background: var(--accent); color: #0f1923; border: none; border-radius: var(--radius-sm); font-size: 16px; font-weight: 700; cursor: pointer; }
  .save-btn:disabled { background: var(--bg3); color: var(--text3); cursor: not-allowed; }

  /* History */
  .history-section { margin-top: 40px; }
  .history-item { background: var(--bg2); border: 1px solid rgba(255,255,255,0.05); border-radius: var(--radius-sm); padding: 14px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .history-floor { font-size: 14px; font-weight: 500; color: var(--text2); flex: 1; }
  .history-who { font-size: 11px; color: var(--accent); background: rgba(79,195,247,0.1); border-radius: 12px; padding: 2px 8px; }
  .history-time { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; }

  /* Feedback UI */
  .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(120px); background: var(--bg3); color: var(--text); padding: 14px 24px; border-radius: 40px; font-size: 14px; transition: transform 0.3s; z-index: 100; border: 1px solid var(--accent); }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .spinner { width: 24px; height: 24px; border: 3px solid var(--bg3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-logo"></div>
    <h1>벤츠 어디있지?</h1>
    <p>우리집 실시간 주차 위치</p>
  </div>

  <div class="conn-status">
    <div class="conn-dot" id="connDot"></div>
    <span id="connText">연결 중...</span>
  </div>

  <div class="status-card">
    <div class="status-label">현재 주차 위치</div>
    <div id="loadingStatus"><div class="spinner"></div></div>
    <div id="emptyStatus" style="display:none; text-align:center; color:var(--text3);">기록된 위치가 없습니다</div>
    <div id="statusLocation" class="status-location" style="display:none;"></div>
    <div class="status-meta" id="statusMeta" style="display:none;">
      <div class="meta-dot"></div>
      <span class="meta-text" id="statusTime"></span>
      <span class="meta-who" id="statusWho"></span>
    </div>
  </div>

  <div class="section-label">위치 업데이트</div>
  <div class="zones">
    <button class="zone-btn" onclick="selectZone(this,'B2-정문')">
      <span class="zone-logo-icon"></span>
      <span class="zone-floor">지하 2층</span>
      <span class="zone-desc">정문쪽</span>
    </button>
    <button class="zone-btn" onclick="selectZone(this,'B2-분리수거')">
      <span class="zone-logo-icon"></span>
      <span class="zone-floor">지하 2층</span>
      <span class="zone-desc">분리수거쪽</span>
    </button>
    <button class="zone-btn" onclick="selectZone(this,'B3')">
      <span class="zone-logo-icon"></span>
      <span class="zone-floor">지하 3층</span>
      <span class="zone-desc">중앙</span>
    </button>
    <button class="zone-btn" onclick="selectZone(this,'B4')">
      <span class="zone-logo-icon"></span>
      <span class="zone-floor">지하 4층</span>
      <span class="zone-desc">여유공간</span>
    </button>
  </div>

  <div class="name-row">
    <input class="name-input" type="text" id="nameInput" placeholder="이름 (남편/아내)" maxlength="10">
  </div>

  <button class="save-btn" id="saveBtn" onclick="saveParking()" disabled>주차 위치 기록하기</button>

  <div class="history-section">
    <div class="section-label">최근 주차 기록</div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getDatabase, ref, set, onValue, push, query, limitToLast } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAICyeJ9vNH6qAGr5FljIEr6xaZq1EZYwo",
    authDomain: "our-parking-dd786.firebaseapp.com",
    databaseURL: "https://our-parking-dd786-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "our-parking-dd786",
    storageBucket: "our-parking-dd786.firebasestorage.app",
    messagingSenderId: "651872295634",
    appId: "1:651872295634:web:12d6b98fa1a3ae1f006b0b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const zoneNames = { 'B2-정문': '지하 2층 (정문쪽)', 'B2-분리수거': '지하 2층 (분리수거)', 'B3': '지하 3층', 'B4': '지하 4층' };

  // Sync Current Data
  onValue(ref(db, 'current'), snap => {
    document.getElementById('loadingStatus').style.display = 'none';
    const data = snap.val();
    if (!data) {
      document.getElementById('emptyStatus').style.display = 'block';
    } else {
      document.getElementById('emptyStatus').style.display = 'none';
      document.getElementById('statusLocation').style.display = 'block';
      document.getElementById('statusMeta').style.display = 'flex';
      document.getElementById('statusLocation').textContent = zoneNames[data.zone] || data.zone;
      const d = new Date(data.time);
      document.getElementById('statusTime').textContent = (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
      document.getElementById('statusWho').textContent = data.who || '가족';
    }
  });

  // Sync History List
  onValue(query(ref(db, 'history'), limitToLast(5)), snap => {
    const list = document.getElementById('historyList');
    const items = [];
    snap.forEach(c => items.push(c.val()));
    list.innerHTML = items.reverse().map(item => `
      <div class="history-item">
        <span class="history-floor">${zoneNames[item.zone]||item.zone}</span>
        <span class="history-who">${item.who||''}</span>
        <span class="history-time">${new Date(item.time).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}</span>
      </div>
    `).join('');
  });

  // Connection State
  onValue(ref(db, '.info/connected'), snap => {
    document.getElementById('connDot').className = 'conn-dot ' + (snap.val() ? 'online' : '');
    document.getElementById('connText').textContent = snap.val() ? '실시간 동기화 중' : '오프라인 상태';
  });

  // Save Function
  window.saveParking = async function() {
    if (!window._selectedZone) return;
    const data = { 
        zone: window._selectedZone, 
        time: new Date().toISOString(), 
        who: document.getElementById('nameInput').value.trim() || '가족' 
    };
    try {
        await set(ref(db, 'current'), data);
        await push(ref(db, 'history'), data);
        showToast('✅ 주차 위치가 업데이트되었습니다.');
        document.querySelectorAll('.zone-btn').forEach(b => b.classList.remove('selected'));
        window._selectedZone = null;
        document.getElementById('saveBtn').disabled = true;
    } catch(e) {
        showToast('⚠️ 연결이 불안정합니다.');
    }
  };
</script>

<script>
  window._selectedZone = null;
  function selectZone(btn, zone) {
    document.querySelectorAll('.zone-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    window._selectedZone = zone;
    document.getElementById('saveBtn').disabled = false;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
